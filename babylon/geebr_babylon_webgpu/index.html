<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>geebr.world — Babylon WebGPU + Havok Prototype</title>
  <style>
    :root {
      --bg:#10131a; --panel:#171c26; --panel2:#202736; --text:#e8ecf4; --muted:#9ea8ba;
      --accent:#8fd3ff; --danger:#ff8d8d; --good:#a5ffbd;
    }
    * { box-sizing: border-box; }
    html, body { margin:0; width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--text); font:14px/1.35 system-ui, -apple-system, Segoe UI, sans-serif; }
    #app { position:fixed; inset:0; display:grid; grid-template-columns:minmax(0,1fr) 330px; min-height:0; }
    #stage { position:relative; min-width:0; min-height:0; overflow:hidden; background: radial-gradient(circle at 50% 30%, #273249, #10131a 70%); }
    #renderCanvas { width:100%; height:100%; display:block; outline:none; touch-action:none; }
    #hud { position:absolute; left:12px; top:12px; padding:8px 10px; border-radius:10px; background:rgba(10,12,18,.72); backdrop-filter:blur(6px); color:#dfe7f6; font-size:12px; pointer-events:none; min-width:260px; }
    #hud b { color:#fff; }
    #error { position:absolute; inset:12px; display:none; padding:16px; border:1px solid #ff7777; border-radius:12px; background:rgba(60,10,10,.92); color:white; white-space:pre-wrap; overflow:auto; z-index:5; }
    #side { min-width:0; min-height:0; overflow:hidden; display:flex; flex-direction:column; border-left:1px solid rgba(255,255,255,.08); background:linear-gradient(180deg,var(--panel),#11151e); }
    header { padding:14px 14px 10px; border-bottom:1px solid rgba(255,255,255,.08); }
    header h1 { margin:0; font-size:18px; letter-spacing:.2px; }
    header p { margin:5px 0 0; color:var(--muted); font-size:12px; }
    .section { padding:12px 14px; border-bottom:1px solid rgba(255,255,255,.07); }
    .row { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    button { appearance:none; border:1px solid rgba(255,255,255,.12); background:var(--panel2); color:var(--text); border-radius:9px; padding:8px 9px; cursor:pointer; font:inherit; }
    button:hover { border-color:rgba(143,211,255,.55); background:#273147; }
    input { width:100%; border:1px solid rgba(255,255,255,.12); background:#0f131c; color:var(--text); border-radius:10px; padding:10px; font:13px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace; }
    #log { flex:1; min-height:0; overflow:auto; padding:12px 14px; display:flex; flex-direction:column; gap:8px; }
    .event { padding:8px 9px; border-radius:9px; background:rgba(255,255,255,.055); color:#dce5f5; font-size:12px; border-left:3px solid rgba(143,211,255,.55); }
    .event.bad { border-color:var(--danger); }
    .event.good { border-color:var(--good); }
    .pill { display:inline-block; margin:2px 4px 2px 0; padding:3px 7px; background:rgba(143,211,255,.10); border:1px solid rgba(143,211,255,.22); border-radius:999px; font-size:11px; color:#ccecff; }
    .small { color:var(--muted); font-size:12px; }
    #selected { color:#fff; font-weight:700; }
    .kbd { font-family:ui-monospace, Menlo, monospace; background:#0d1118; padding:2px 5px; border-radius:5px; }
  </style>
</head>
<body>
<div id="app">
  <main id="stage">
    <canvas id="renderCanvas"></canvas>
    <div id="hud">booting…</div>
    <div id="error"></div>
  </main>
  <aside id="side">
    <header>
      <h1>geebr.world</h1>
      <p>True 3D: Babylon.js WebGPU + Havok WASM. No WebGL path.</p>
    </header>
    <div class="section">
      <div>Selected: <span id="selected">Brindle</span></div>
      <div class="small">Click a Geebr to select. Click blocks to damage/target.</div>
      <div class="row">
        <button data-cmd="walk n">walk n</button><button data-cmd="walk e">walk e</button><button data-cmd="walk s">walk s</button><button data-cmd="walk w">walk w</button>
        <button data-cmd="dig">dig</button><button data-cmd="build wall">build wall</button>
        <button data-cmd="spell push">spell push</button><button data-cmd="spell spark">spark</button><button data-cmd="panic">panic</button>
      </div>
    </div>
    <div class="section">
      <input id="cmd" value="say gravity is illegal" />
      <div class="row"><button id="run">run command</button><button id="spawnCrate">spawn crate</button><button id="spawnDebris">debris burst</button></div>
      <p class="small">Console: <span class="kbd">window.runCommand("spell push")</span></p>
    </div>
    <div class="section">
      <span class="pill">WebGPU only</span><span class="pill">Havok physics</span><span class="pill">destructible cubes</span><span class="pill">component Geebrs</span>
    </div>
    <div id="log"></div>
  </aside>
</div>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/havok/HavokPhysics_umd.js"></script>
<script>
(() => {
  const canvas = document.getElementById('renderCanvas');
  const hud = document.getElementById('hud');
  const errBox = document.getElementById('error');
  const logEl = document.getElementById('log');
  const selectedEl = document.getElementById('selected');
  const cmdInput = document.getElementById('cmd');

  const GRID = 13, HALF = Math.floor(GRID/2), TILE = 1.25;
  let engine, scene, physicsPlugin;
  let tick = 0, selected = null, targetBlock = null;
  const blocks = new Map();
  const bodies = [];
  const geebrs = [];
  const mats = {};

  function key(x,z,y=0){ return `${x},${z},${y}`; }
  function gridToWorld(x,z,y=0){ return new BABYLON.Vector3(x*TILE, y*TILE + 0.5*TILE, z*TILE); }
  function log(msg, cls=''){
    const el = document.createElement('div');
    el.className = 'event ' + cls;
    el.textContent = msg;
    logEl.prepend(el);
    while (logEl.children.length > 80) logEl.lastChild.remove();
  }
  function showError(e){
    console.error(e);
    errBox.style.display = 'block';
    errBox.textContent = (e && e.stack) ? e.stack : String(e);
  }
  function rand(min,max){ return min + Math.random()*(max-min); }

  async function boot(){
    if (!navigator.gpu) throw new Error('navigator.gpu is unavailable. This prototype intentionally does not use WebGL fallback.');
    engine = new BABYLON.WebGPUEngine(canvas, { antialias:true, adaptToDeviceRatio:true });
    await engine.initAsync();
    scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0.055,0.07,0.10,1);

    const havok = await HavokPhysics();
    physicsPlugin = new BABYLON.HavokPlugin(true, havok);
    scene.enablePhysics(new BABYLON.Vector3(0,-9.8,0), physicsPlugin);

    setupMaterials();
    setupCameraLights();
    buildWorld();
    createGeebr('Brindle', -3, -2, '#89d37d', 'bucket');
    createGeebr('Mogo', 2, -1, '#e2a35f', 'cone');
    createGeebr('Pim', 0, 3, '#86b7ff', 'cap');
    selected = geebrs[0];
    selectedEl.textContent = selected.name;
    addCrate(1,1); addBarrel(-2,2);
    hookUI();

    scene.onPointerObservable.add(pointerInfo => {
      if (pointerInfo.type !== BABYLON.PointerEventTypes.POINTERPICK) return;
      const pick = pointerInfo.pickInfo;
      if (!pick || !pick.hit || !pick.pickedMesh) return;
      const root = pick.pickedMesh.metadata?.root || pick.pickedMesh;
      if (root.metadata?.kind === 'geebr') selectGeebr(root.metadata.ref);
      if (root.metadata?.kind === 'block') { targetBlock = root.metadata.ref; damageBlock(targetBlock, 10, 'poked'); }
    });

    engine.runRenderLoop(() => {
      tick++;
      updateSpeech();
      updateBodyMeshes();
      scene.render();
      hud.innerHTML = `<b>Babylon WebGPU + Havok</b><br>tick ${tick} · blocks ${blocks.size} · bodies ${bodies.length}<br>selected ${selected?.name || 'none'} · target ${targetBlock ? targetBlock.k : 'none'}`;
    });
    window.addEventListener('resize', () => engine.resize());
    log('WebGPU engine initialized. Havok physics active.', 'good');
  }

  function setupMaterials(){
    const mk = (name, color, rough=0.75) => {
      const m = new BABYLON.StandardMaterial(name, scene);
      m.diffuseColor = BABYLON.Color3.FromHexString(color);
      m.specularColor = new BABYLON.Color3(0.08,0.08,0.08);
      return m;
    };
    mats.ground = mk('ground', '#31394b'); mats.stone = mk('stone', '#6d7480'); mats.wood = mk('wood', '#9b7042');
    mats.glass = mk('glass', '#84d9ff'); mats.crack = mk('crack', '#cc7d58'); mats.geebrEye = mk('eyes', '#111318');
    mats.debris = mk('debris', '#b28b64'); mats.select = mk('select', '#b7f7ff'); mats.fire = mk('fire', '#ff754a');
    mats.red = mk('red', '#d86464'); mats.green = mk('green', '#76ca79'); mats.blue = mk('blue', '#7ca8ee'); mats.black = mk('black', '#12151a');
  }

  function setupCameraLights(){
    const camera = new BABYLON.ArcRotateCamera('camera', -Math.PI/4, Math.PI/3.2, 23, new BABYLON.Vector3(0,0,0), scene);
    camera.mode = BABYLON.Camera.ORTHOGRAPHIC_CAMERA;
    camera.orthoTop = 10; camera.orthoBottom = -10; camera.orthoLeft = -12.5; camera.orthoRight = 12.5;
    camera.attachControl(canvas, true);
    camera.lowerRadiusLimit = 10; camera.upperRadiusLimit = 34;
    camera.wheelPrecision = 40;
    const hemi = new BABYLON.HemisphericLight('hemi', new BABYLON.Vector3(0.3,1,0.2), scene); hemi.intensity = 0.85;
    const sun = new BABYLON.DirectionalLight('sun', new BABYLON.Vector3(-0.7,-1.4,-0.8), scene); sun.position = new BABYLON.Vector3(8,12,9); sun.intensity = 1.15;
  }

  function buildWorld(){
    for (let x=-HALF; x<=HALF; x++) for (let z=-HALF; z<=HALF; z++) {
      const floor = BABYLON.MeshBuilder.CreateBox(`floor ${x},${z}`, { width:TILE, height:0.16, depth:TILE }, scene);
      floor.position = new BABYLON.Vector3(x*TILE, -0.08, z*TILE);
      floor.material = mats.ground;
      floor.metadata = { kind:'floor', x,z };
      new BABYLON.PhysicsAggregate(floor, BABYLON.PhysicsShapeType.BOX, { mass:0, friction:0.9, restitution:0.05 }, scene);
      if (Math.abs(x)===HALF || Math.abs(z)===HALF || (x===-1 && z>1 && z<5) || (z===-3 && x>-5 && x<2)) {
        createBlock(x,z,0, Math.abs(x)===HALF||Math.abs(z)===HALF ? 'stone':'wood');
      }
    }
    for (let i=0;i<4;i++) createBlock(-4+i,4,0,'glass');
    createBlock(3,2,0,'wood'); createBlock(3,2,1,'wood'); createBlock(4,2,0,'wood');
  }

  function createBlock(x,z,y=0, mat='stone'){
    const k = key(x,z,y); if (blocks.has(k)) return blocks.get(k);
    const mesh = BABYLON.MeshBuilder.CreateBox(`block ${k}`, { width:TILE, height:TILE, depth:TILE }, scene);
    mesh.position = gridToWorld(x,z,y);
    mesh.material = mats[mat] || mats.stone;
    const block = { k,x,z,y,mat,hp: mat==='glass'?26: mat==='wood'?42:70, maxhp: mat==='glass'?26: mat==='wood'?42:70, mesh, agg:null, fire:0 };
    mesh.metadata = { kind:'block', ref:block };
    block.agg = new BABYLON.PhysicsAggregate(mesh, BABYLON.PhysicsShapeType.BOX, { mass:0, friction:0.85, restitution:0.05 }, scene);
    blocks.set(k, block);
    return block;
  }

  function destroyBlock(block, reason='destroyed'){
    if (!block || !blocks.has(block.k)) return;
    blocks.delete(block.k);
    const pos = block.mesh.position.clone();
    block.agg?.dispose(); block.mesh.dispose();
    for (let i=0;i<6;i++) spawnChunk(pos.x+rand(-.25,.25), pos.y+rand(-.1,.3), pos.z+rand(-.25,.25), block.mat);
    log(`${block.mat} block ${block.k} broke: ${reason}`, 'bad');
    recomputeSupportAround(block.x, block.z, block.y);
  }

  function damageBlock(block, amount, reason='damaged'){
    if (!block) return;
    block.hp -= amount;
    const ratio = Math.max(0, block.hp / block.maxhp);
    if (ratio < 0.45) block.mesh.material = mats.crack;
    block.mesh.scaling.y = 0.82 + 0.18*ratio;
    if (block.hp <= 0) destroyBlock(block, reason);
  }

  function recomputeSupportAround(x,z,y){
    for (const b of Array.from(blocks.values())) {
      if (b.y <= 0) continue;
      const below = blocks.get(key(b.x,b.z,b.y-1));
      if (!below) {
        b.agg?.dispose();
        blocks.delete(b.k);
        b.mesh.metadata = { kind:'looseBlock' };
        const agg = new BABYLON.PhysicsAggregate(b.mesh, BABYLON.PhysicsShapeType.BOX, { mass:2.5, friction:0.7, restitution:0.25 }, scene);
        bodies.push({ mesh:b.mesh, agg, ttl:9999, kind:'fallingBlock' });
        agg.body.applyImpulse(new BABYLON.Vector3(rand(-.8,.8), rand(.5,1.5), rand(-.8,.8)), b.mesh.getAbsolutePosition());
        log(`unsupported ${b.mat} block fell`, 'bad');
      }
    }
  }

  function createGeebr(name,x,z,color,hat){
    const root = new BABYLON.TransformNode(name, scene);
    root.position = new BABYLON.Vector3(x*TILE, 0.15, z*TILE);
    const bodyMat = new BABYLON.StandardMaterial(name+'mat', scene); bodyMat.diffuseColor = BABYLON.Color3.FromHexString(color); bodyMat.specularColor = new BABYLON.Color3(.05,.05,.05);
    const body = BABYLON.MeshBuilder.CreateSphere(name+' body', { diameter:0.72, segments:12 }, scene); body.scaling.y=1.15; body.position.y=0.62; body.material=bodyMat; body.parent=root;
    const head = BABYLON.MeshBuilder.CreateSphere(name+' head', { diameter:0.55, segments:12 }, scene); head.position.y=1.17; head.material=bodyMat; head.parent=root;
    const eye1 = BABYLON.MeshBuilder.CreateSphere(name+' eye1', { diameter:0.09, segments:8 }, scene); eye1.position.set(-.12,1.2,-.25); eye1.material=mats.geebrEye; eye1.parent=root;
    const eye2 = eye1.clone(name+' eye2'); eye2.position.x=.12; eye2.parent=root;
    const foot1 = BABYLON.MeshBuilder.CreateBox(name+' foot1', { width:.22,height:.12,depth:.35 }, scene); foot1.position.set(-.18,.12,-.08); foot1.material=bodyMat; foot1.parent=root;
    const foot2 = foot1.clone(name+' foot2'); foot2.position.x=.18; foot2.parent=root;
    let hatMesh;
    if (hat==='cone') hatMesh = BABYLON.MeshBuilder.CreateCylinder(name+' cone', { diameterTop:0, diameterBottom:.42, height:.48, tessellation:12 }, scene);
    else hatMesh = BABYLON.MeshBuilder.CreateCylinder(name+' hat', { diameter:.45, height:.22, tessellation:12 }, scene);
    hatMesh.position.y=1.58; hatMesh.material = hat==='bucket'?mats.blue:hat==='cone'?mats.red:mats.green; hatMesh.parent=root;
    root.metadata = { kind:'geebr', ref:null };
    for (const m of [body,head,eye1,eye2,foot1,foot2,hatMesh]) m.metadata = { root };
    const marker = BABYLON.MeshBuilder.CreateTorus(name+' select', { diameter:1.05, thickness:.035, tessellation:24 }, scene); marker.rotation.x=Math.PI/2; marker.position.y=.08; marker.material=mats.select; marker.parent=root; marker.setEnabled(false);
    const geebr = { name, root, x,z, marker, speech:null, speechT:0, mood:'idle', queue:[] };
    root.metadata.ref = geebr;
    geebrs.push(geebr);
    return geebr;
  }

  function selectGeebr(g){ selected = g; selectedEl.textContent = g.name; log(`selected ${g.name}`); }

  function updateSpeech(){
    for (const g of geebrs) {
      g.marker.setEnabled(g===selected);
      g.root.rotation.y = Math.sin(tick/28 + g.x)*0.05;
      g.root.position.y = 0.15 + Math.sin(tick/10 + g.z)*0.025;
      if (g.speech) {
        g.speechT--;
        g.speech.position = g.root.position.add(new BABYLON.Vector3(0,2.15,0));
        if (g.speechT <= 0) { g.speech.dispose(); g.speech=null; }
      }
    }
  }

  function say(g, text){
    log(`${g.name}: ${text}`);
    if (g.speech) g.speech.dispose();
    const plane = BABYLON.MeshBuilder.CreatePlane('speech', { width: Math.min(4.8, 1.2 + text.length*.075), height:.42 }, scene);
    plane.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;
    plane.position = g.root.position.add(new BABYLON.Vector3(0,2.15,0));
    const tex = new BABYLON.DynamicTexture('speechTex', { width:512, height:96 }, scene, false);
    const ctx = tex.getContext(); ctx.clearRect(0,0,512,96); ctx.fillStyle='rgba(255,255,255,.92)'; ctx.fillRect(0,0,512,96); ctx.fillStyle='#11151a'; ctx.font='bold 28px system-ui'; ctx.fillText(text.slice(0,42), 18, 57); tex.update();
    const mat = new BABYLON.StandardMaterial('speechMat', scene); mat.diffuseTexture=tex; mat.emissiveColor = new BABYLON.Color3(1,1,1); mat.disableLighting=true;
    plane.material=mat; g.speech=plane; g.speechT=190;
  }

  function moveGeebr(g, dx,dz){
    const nx = Math.max(-HALF+1, Math.min(HALF-1, g.x+dx));
    const nz = Math.max(-HALF+1, Math.min(HALF-1, g.z+dz));
    if (blocks.has(key(nx,nz,0))) { log(`${g.name} bonked into a block`, 'bad'); say(g, 'wall conspiracy'); return; }
    g.x=nx; g.z=nz;
    BABYLON.Animation.CreateAndStartAnimation('walk', g.root, 'position', 60, 12, g.root.position.clone(), new BABYLON.Vector3(nx*TILE,.15,nz*TILE), BABYLON.Animation.ANIMATIONLOOPMODE_CONSTANT);
  }

  function addCrate(x=rand(-3,3), z=rand(-3,3)){
    const mesh = BABYLON.MeshBuilder.CreateBox('crate', { width:.85, height:.85, depth:.85 }, scene);
    mesh.position = new BABYLON.Vector3(x*TILE, 1.1, z*TILE); mesh.material=mats.wood;
    const agg = new BABYLON.PhysicsAggregate(mesh, BABYLON.PhysicsShapeType.BOX, { mass:1.2, friction:.75, restitution:.25 }, scene);
    bodies.push({mesh,agg,ttl:99999,kind:'crate'}); log('spawned crate'); return mesh;
  }
  function addBarrel(x=rand(-3,3), z=rand(-3,3)){
    const mesh = BABYLON.MeshBuilder.CreateCylinder('barrel', { diameter:.7, height:.9, tessellation:16 }, scene);
    mesh.rotation.z = Math.PI/2; mesh.position = new BABYLON.Vector3(x*TILE, 1.2, z*TILE); mesh.material=mats.red;
    const agg = new BABYLON.PhysicsAggregate(mesh, BABYLON.PhysicsShapeType.CYLINDER, { mass:1.0, friction:.7, restitution:.35 }, scene);
    bodies.push({mesh,agg,ttl:99999,kind:'barrel'}); log('spawned barrel'); return mesh;
  }
  function spawnChunk(x,y,z,mat='wood'){
    const s = rand(.16,.34); const mesh = BABYLON.MeshBuilder.CreateBox('chunk', { width:s, height:s, depth:s }, scene);
    mesh.position = new BABYLON.Vector3(x,y,z); mesh.rotation = new BABYLON.Vector3(rand(0,3),rand(0,3),rand(0,3)); mesh.material = mat==='glass'?mats.glass:mat==='stone'?mats.stone:mats.debris;
    const agg = new BABYLON.PhysicsAggregate(mesh, BABYLON.PhysicsShapeType.BOX, { mass:.25, friction:.55, restitution:.45 }, scene);
    agg.body.applyImpulse(new BABYLON.Vector3(rand(-1.8,1.8), rand(.8,3.2), rand(-1.8,1.8)), mesh.getAbsolutePosition());
    bodies.push({mesh,agg,ttl:700,kind:'debris'});
  }
  function updateBodyMeshes(){
    for (let i=bodies.length-1;i>=0;i--) {
      const b = bodies[i];
      if (b.ttl !== 99999) b.ttl--;
      if (b.ttl <= 0 || b.mesh.position.y < -12) { b.agg?.dispose(); b.mesh.dispose(); bodies.splice(i,1); }
    }
  }

  function command(raw){
    if (!selected) return;
    const s = String(raw || '').trim(); if (!s) return;
    const lower = s.toLowerCase();
    if (lower.startsWith('say ')) { say(selected, s.slice(4)); return; }
    if (lower.startsWith('walk')) {
      const d = lower.match(/\b(n|s|e|w|north|south|east|west)\b/)?.[1] || ['n','s','e','w'][Math.floor(Math.random()*4)];
      const m = {n:[0,-1],north:[0,-1],s:[0,1],south:[0,1],e:[1,0],east:[1,0],w:[-1,0],west:[-1,0]}[d]; moveGeebr(selected, m[0], m[1]); return;
    }
    if (lower.includes('panic')) { say(selected, 'I am handling this poorly'); for(let i=0;i<5;i++) setTimeout(()=>moveGeebr(selected, ...[[1,0],[-1,0],[0,1],[0,-1]][Math.floor(Math.random()*4)]), i*140); return; }
    if (lower.includes('build')) { const bx=selected.x, bz=selected.z-1; createBlock(bx,bz,0,'wood'); log(`${selected.name} built a suspicious wall`, 'good'); return; }
    if (lower.includes('dig')) { const b = targetBlock || blocks.get(key(selected.x, selected.z-1, 0)) || nearestBlock(selected); damageBlock(b, 36, `${selected.name} dug`); return; }
    if (lower.includes('spark')) { const b = targetBlock || nearestBlock(selected); if (b) { damageBlock(b, 20, 'sparked'); for(let i=0;i<8;i++) spawnChunk(b.mesh.position.x,b.mesh.position.y+.3,b.mesh.position.z,'glass'); say(selected, 'tiny unsafe magic'); } return; }
    if (lower.includes('push')) {
      const origin = selected.root.position;
      for (const b of bodies) {
        const d = BABYLON.Vector3.Distance(origin, b.mesh.position);
        if (d < 4.2) {
          const dir = b.mesh.position.subtract(origin).normalize().scale(4.5);
          b.agg.body.applyImpulse(new BABYLON.Vector3(dir.x, 1.1, dir.z), b.mesh.getAbsolutePosition());
        }
      }
      const bl = targetBlock || nearestBlock(selected); if (bl) damageBlock(bl, 16, 'pushed by spell');
      say(selected, 'motion has been filed'); return;
    }
    log(`unknown command: ${s}`, 'bad'); say(selected, 'invalid thought');
  }
  function nearestBlock(g){
    let best=null, bd=1e9; const p=g.root.position;
    for (const b of blocks.values()) { const d=BABYLON.Vector3.Distance(p,b.mesh.position); if(d<bd){bd=d; best=b;} }
    return best;
  }

  function hookUI(){
    document.querySelectorAll('[data-cmd]').forEach(btn => btn.addEventListener('click', () => command(btn.dataset.cmd)));
    document.getElementById('run').addEventListener('click', () => command(cmdInput.value));
    cmdInput.addEventListener('keydown', e => { if(e.key==='Enter') command(cmdInput.value); });
    document.getElementById('spawnCrate').addEventListener('click', () => Math.random()<.5 ? addCrate() : addBarrel());
    document.getElementById('spawnDebris').addEventListener('click', () => { const p=selected.root.position; for(let i=0;i<24;i++) spawnChunk(p.x,p.y+1,p.z,'wood'); log('debris burst'); });
    window.runCommand = command;
  }

  boot().catch(showError);
})();
</script>
</body>
</html>
