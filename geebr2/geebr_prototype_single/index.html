<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>geebr.world physics prototype</title>
  <style>
    :root { color-scheme: dark; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
    * { box-sizing: border-box; }
    html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#0d0e13; color:#f4f0e8; }
    #app { position:fixed; inset:0; display:grid; grid-template-columns:minmax(320px,1fr) 340px; }
    #stageWrap { position:relative; min-width:0; min-height:0; overflow:hidden; background:radial-gradient(circle at center,#222536,#0b0c12 70%); }
    #game { position:absolute; inset:0; width:100%; height:100%; display:block; cursor:crosshair; }
    aside { min-width:340px; border-left:1px solid #2d3040; padding:14px; background:#151721; display:flex; flex-direction:column; gap:12px; overflow:hidden; }
    h1 { font-size:18px; margin:0; }
    h2 { font-size:13px; margin:8px 0 4px; color:#b9b3ff; text-transform:uppercase; letter-spacing:.08em; }
    button, input { background:#242737; color:#f4f0e8; border:1px solid #3c4058; border-radius:8px; padding:8px; }
    button:hover { background:#30344a; }
    .row { display:flex; gap:8px; flex-wrap:wrap; }
    .row > button { flex:1; min-width:72px; }
    #log { flex:1; overflow:auto; background:#0f1018; border:1px solid #2d3040; border-radius:10px; padding:10px; font-size:12px; line-height:1.35; }
    .hint { color:#b7b9ca; font-size:12px; line-height:1.35; }
    .pill { display:inline-block; padding:2px 6px; border-radius:999px; background:#2c3045; color:#d9d7ff; margin:2px; font-size:11px; }
    code { color:#ffd58a; }
    #hud { position:absolute; left:10px; top:10px; padding:7px 9px; border-radius:9px; background:rgba(0,0,0,.35); color:#dfe1ff; font-size:12px; pointer-events:none; }
    #err { display:none; position:fixed; left:12px; bottom:12px; z-index:10; max-width:70vw; max-height:36vh; overflow:auto; background:#260912; color:#ffdbe2; border:1px solid #ff6b8a; padding:10px; border-radius:8px; font:12px/1.35 ui-monospace,monospace; white-space:pre-wrap; }
  </style>
</head>
<body>
<div id="app">
  <div id="stageWrap"><canvas id="game"></canvas><div id="hud">loading...</div></div>
  <aside>
    <h1>geebr.world prototype</h1>
    <div class="hint">Self-contained canvas prototype. Click a Geebr to select. Your parser can call <code>window.runCommand(...)</code>.</div>
    <div id="selected"></div>
    <h2>Commands</h2>
    <div class="row">
      <button data-cmd="walk n">walk N</button><button data-cmd="walk s">walk S</button>
      <button data-cmd="walk w">walk W</button><button data-cmd="walk e">walk E</button>
    </div>
    <div class="row">
      <button data-cmd="push">push</button><button data-cmd="dig">dig</button><button data-cmd="spell spark">spark</button><button data-cmd="panic">panic</button>
    </div>
    <div class="row"><button data-cmd="spell push">spell push</button><button data-cmd="build wall">build wall</button></div>
    <div class="row"><button id="spawn">spawn Geebr</button><button id="reset">reset</button></div>
    <h2>Console</h2>
    <input id="console" placeholder='say gravity is illegal | walk n | spell push | build wall' />
    <div class="row"><button id="run">run</button><button id="step">step physics</button></div>
    <h2>Grammar Surface</h2>
    <div><span class="pill">say(text)</span><span class="pill">walk(dir)</span><span class="pill">push()</span><span class="pill">dig()</span><span class="pill">spell(push|spark)</span><span class="pill">build(wall)</span><span class="pill">panic()</span></div>
    <h2>Event Log</h2>
    <div id="log"></div>
  </aside>
</div>
<pre id="err"></pre>
<script>
(() => {
'use strict';
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const logEl = document.getElementById('log');
const selectedEl = document.getElementById('selected');
const errEl = document.getElementById('err');
const W = 22, H = 22, TILE_W = 54, TILE_H = 28, Z_H = 18;
const dirs = { n:[0,-1], s:[0,1], w:[-1,0], e:[1,0] };
const dirNames = Object.keys(dirs);
const materials = {
  floor:   { solid:false, hp:999, color:'#3a414f', side:'#252b36' },
  wall:    { solid:true,  hp:4,   color:'#84796f', side:'#504940' },
  wood:    { solid:true,  hp:2,   color:'#a06f48', side:'#664229' },
  glass:   { solid:true,  hp:1,   color:'#8fcfe6', side:'#3f7081' },
  support: { solid:true,  hp:3,   color:'#c3a25d', side:'#715a2b' },
  rubble:  { solid:false, hp:1,   color:'#5d5b59', side:'#353434' }
};
let dpr = 1, world = [], geebrs = [], particles = [], selected = 0, tick = 0, lastT = 0;
function showErr(e){ errEl.style.display='block'; errEl.textContent = e && e.stack ? e.stack : String(e); console.error(e); }
function id(){ return 'g_' + Math.random().toString(36).slice(2) + Date.now().toString(36); }
function rand(n){ return Math.floor(Math.random()*n); }
function cell(x,y){ return x>=0 && y>=0 && x<W && y<H ? world[y][x] : null; }
function makeCell(type='floor', z=0){ const m = materials[type] || materials.floor; return { type, z, hp:m.hp, burn:0, unstable:false }; }
function resize(){
  const r = canvas.getBoundingClientRect();
  dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  canvas.width = Math.max(1, Math.floor(r.width * dpr));
  canvas.height = Math.max(1, Math.floor(r.height * dpr));
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
function iso(x,y,z=0){
  const cw = canvas.getBoundingClientRect().width || 800;
  const ox = cw / 2;
  const oy = 46;
  return { x: ox + (x-y)*TILE_W/2, y: oy + (x+y)*TILE_H/2 - z*Z_H };
}
function log(who,msg){ const div=document.createElement('div'); div.innerHTML = '<b>'+esc(who)+':</b> '+esc(msg); logEl.prepend(div); }
function esc(s){ return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function newGeebr(name,x,y){ return { id:id(), name, x, y, z:1, facing:'s', mood:'confused', hp:3, bubble:'', bubbleT:0, hue:rand(360) }; }
function reset(){
  world = Array.from({length:H}, (_,y)=>Array.from({length:W},(_,x)=>makeCell('floor',0)));
  for(let y=3;y<H-3;y++) for(let x=3;x<W-3;x++) if(x===3||x===W-4||y===3||y===H-4) world[y][x] = makeCell('wall',1);
  for(let i=0;i<36;i++){ const x=5+rand(W-10), y=5+rand(H-10); world[y][x] = makeCell(['wood','glass','support','wall'][rand(4)], 1+rand(2)); }
  for(let x=8;x<14;x++) world[11][x] = makeCell('support',2);
  geebrs = [newGeebr('Brindle',7,8), newGeebr('Mogo',14,13), newGeebr('Pim',10,15)];
  particles = []; selected = 0; logEl.innerHTML=''; log('world','new destructible room generated'); updateSelected();
}
function blocked(x,y){ const c=cell(x,y); if(!c) return true; return materials[c.type].solid; }
function spawnParticles(x,y,n,color){ for(let i=0;i<n;i++) particles.push({ x:x+.5, y:y+.5, z:.6+Math.random()*1.2, vx:(Math.random()-.5)*.08, vy:(Math.random()-.5)*.08, vz:Math.random()*.14, life:24+rand(28), color:color||'#d7c197' }); }
function damage(x,y,amt,source='damage'){
  const c=cell(x,y); if(!c || c.type==='floor' || c.type==='rubble') return false;
  c.hp -= amt; c.unstable = true; spawnParticles(x,y,7,materials[c.type].color);
  if(c.hp<=0){ log(source, c.type+' broke at '+x+','+y); world[y][x]=makeCell('rubble',0); spawnParticles(x,y,14,materials[c.type].color); return true; }
  return false;
}
function front(g){ const d=dirs[g.facing] || dirs.s; return [g.x+d[0], g.y+d[1]]; }
function setBubble(g,msg,t=80){ g.bubble=msg; g.bubbleT=t; }
function walk(g,dir){
  if(!dirs[dir]) dir = g.facing || 's';
  g.facing = dir; const [dx,dy]=dirs[dir]; const nx=g.x+dx, ny=g.y+dy;
  if(!blocked(nx,ny) && !geebrs.some(o=>o!==g && o.x===nx && o.y===ny)){ g.x=nx; g.y=ny; setBubble(g,'step',24); }
  else { setBubble(g,'bonk',65); log(g.name,'bonked into an obstacle'); damage(nx,ny,.25,g.name); }
}
function push(g){
  const [tx,ty]=front(g); const d=dirs[g.facing]; const nx=tx+d[0], ny=ty+d[1]; const c=cell(tx,ty);
  if(c && materials[c.type].solid && cell(nx,ny) && !blocked(nx,ny)){ world[ny][nx]=c; world[ty][tx]=makeCell('floor',0); log(g.name,'pushed '+c.type); }
  else { damage(tx,ty,1,g.name); log(g.name,'pushed reality unsuccessfully'); }
}
function dig(g){ const [tx,ty]=front(g); damage(tx,ty,2,g.name); }
function build(g,type){ const [tx,ty]=front(g); if(cell(tx,ty) && !blocked(tx,ty)){ world[ty][tx]=makeCell(type==='support'?'support':'wall',1); log(g.name,'built questionable '+type); } else log(g.name,'failed to build because matter was already there'); }
function spellPush(g){ const [tx,ty]=front(g); damage(tx,ty,1.5,g.name+' spell'); for(const o of geebrs) if(o!==g && Math.abs(o.x-tx)+Math.abs(o.y-ty)<2) walk(o,g.facing); setBubble(g,'PUSH?',70); log(g.name,'cast push with legal uncertainty'); }
function spark(g){ const [tx,ty]=front(g); const c=cell(tx,ty); if(c){ c.burn=Math.max(c.burn,6); setBubble(g,'fire idea',70); log(g.name,'introduced fire to problem'); } }
function panic(g){ setBubble(g,'PANIC PROTOCOL',90); for(let i=0;i<3;i++) walk(g, dirNames[rand(4)]); log(g.name,'panic protocol damaged local planning'); }
function runCommand(command, geebrIndex=selected){
  const g = geebrs[geebrIndex]; if(!g) return;
  const raw = typeof command === 'string' ? command.trim() : String(command?.cmd || ''); if(!raw) return;
  const [verb,...rest] = raw.split(/\s+/);
  if(verb==='say'){ const msg=rest.join(' ') || 'invalid thoughts'; setBubble(g,msg,170); log(g.name,msg); return; }
  if(verb==='walk') return walk(g, rest[0] || g.facing);
  if(verb==='push') return push(g);
  if(verb==='dig') return dig(g);
  if(verb==='panic') return panic(g);
  if(verb==='spell') return (rest[0]==='spark') ? spark(g) : spellPush(g);
  if(verb==='build') return build(g, rest[0] || 'wall');
  setBubble(g,'unknown verb',80); log(g.name,'failed command: '+raw);
}
function physicsStep(){
  tick++;
  for(let y=0;y<H;y++) for(let x=0;x<W;x++){
    const c=world[y][x];
    if(c.burn>0){ c.burn--; if(c.type==='wood'||c.type==='support') damage(x,y,.36,'fire'); if(Math.random()<.18) for(const [dx,dy] of Object.values(dirs)){ const n=cell(x+dx,y+dy); if(n && (n.type==='wood'||n.type==='support')) n.burn=Math.max(n.burn,4); } }
    if(materials[c.type].solid && c.z>1){
      const supported = Object.values(dirs).some(([dx,dy]) => { const n=cell(x+dx,y+dy); return n && n.type==='support' && n.z>=c.z-1; });
      if(!supported && Math.random()<.07){ c.z--; c.unstable=true; log('physics', c.type+' sagged at '+x+','+y); if(c.z<=0){ world[y][x]=makeCell('rubble',0); spawnParticles(x,y,16); } }
    }
  }
  for(const p of particles){ p.x+=p.vx; p.y+=p.vy; p.z+=p.vz; p.vz-=.011; p.life--; }
  particles = particles.filter(p => p.life>0 && p.z>=0);
}
function poly(points, fill, stroke){ ctx.beginPath(); ctx.moveTo(points[0].x,points[0].y); for(let i=1;i<points.length;i++) ctx.lineTo(points[i].x,points[i].y); ctx.closePath(); ctx.fillStyle=fill; ctx.fill(); if(stroke){ ctx.strokeStyle=stroke; ctx.lineWidth=1; ctx.stroke(); } }
function drawTile(x,y,c){
  const p=iso(x,y,c.z); const m=materials[c.type]; const top=c.burn>0?'#e8653d':m.color;
  // sides for height readability
  if(c.z>0){
    poly([{x:p.x-TILE_W/2,y:p.y+TILE_H/2},{x:p.x,y:p.y+TILE_H},{x:p.x,y:p.y+TILE_H+c.z*Z_H},{x:p.x-TILE_W/2,y:p.y+TILE_H/2+c.z*Z_H}], m.side, null);
    poly([{x:p.x+TILE_W/2,y:p.y+TILE_H/2},{x:p.x,y:p.y+TILE_H},{x:p.x,y:p.y+TILE_H+c.z*Z_H},{x:p.x+TILE_W/2,y:p.y+TILE_H/2+c.z*Z_H}], shade(m.side,.85), null);
  }
  poly([{x:p.x,y:p.y},{x:p.x+TILE_W/2,y:p.y+TILE_H/2},{x:p.x,y:p.y+TILE_H},{x:p.x-TILE_W/2,y:p.y+TILE_H/2}], top, c.unstable?'#ffcf72':'#202535');
  if(c.type==='rubble'){ ctx.fillStyle='#25252a'; ctx.fillRect(p.x-8,p.y+15,16,5); }
}
function shade(hex,k){ const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255; r=Math.round(r*k);g=Math.round(g*k);b=Math.round(b*k); return `rgb(${r},${g},${b})`; }
function drawGeebr(g){
  const p=iso(g.x,g.y,1); ctx.save();
  ctx.fillStyle='rgba(0,0,0,.28)'; ctx.beginPath(); ctx.ellipse(p.x,p.y+25,17,7,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=`hsl(${g.hue} 72% 64%)`; ctx.beginPath(); ctx.arc(p.x,p.y+12,13,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=geebrs[selected]===g?'#ffffff':'#151515'; ctx.lineWidth=geebrs[selected]===g?3:1; ctx.stroke();
  ctx.fillStyle='#14151c'; ctx.beginPath(); ctx.arc(p.x-4,p.y+9,2,0,Math.PI*2); ctx.arc(p.x+5,p.y+9,2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='11px sans-serif'; ctx.textAlign='center'; ctx.fillText(g.name,p.x,p.y-8);
  if(g.bubbleT>0){ const text=g.bubble.slice(0,32); const w=Math.max(52,Math.min(190,text.length*6+14)); ctx.fillStyle='rgba(10,12,18,.90)'; roundRect(p.x-w/2,p.y-51,w,25,8); ctx.fill(); ctx.fillStyle='#fff'; ctx.fillText(text,p.x,p.y-34); g.bubbleT--; }
  ctx.restore();
}
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function render(t=0){
  try{
    const r = canvas.getBoundingClientRect();
    if(canvas.width !== Math.floor(r.width*dpr) || canvas.height !== Math.floor(r.height*dpr)) resize();
    ctx.clearRect(0,0,r.width,r.height);
    // unmistakable fallback background so a zero-scene bug is visible
    ctx.fillStyle='#10131d'; ctx.fillRect(0,0,r.width,r.height);
    ctx.fillStyle='rgba(255,255,255,.04)'; for(let x=0;x<r.width;x+=40) ctx.fillRect(x,0,1,r.height); for(let y=0;y<r.height;y+=40) ctx.fillRect(0,y,r.width,1);
    for(let y=0;y<H;y++) for(let x=0;x<W;x++) drawTile(x,y,world[y][x]);
    [...geebrs].sort((a,b)=>(a.x+a.y)-(b.x+b.y)).forEach(drawGeebr);
    for(const p of particles){ const q=iso(p.x,p.y,p.z); ctx.fillStyle=p.color; ctx.fillRect(q.x,q.y,3,3); }
    hud.textContent = `canvas ${Math.round(r.width)}×${Math.round(r.height)} | geebrs ${geebrs.length} | tick ${tick}`;
    requestAnimationFrame(render);
  } catch(e){ showErr(e); }
}
function updateSelected(){ const g=geebrs[selected]; selectedEl.innerHTML = g ? `<b>Selected:</b> ${esc(g.name)}<br><span class="hint">mood: ${esc(g.mood)}; facing: ${esc(g.facing)}</span>` : 'none'; }
canvas.addEventListener('click', e => { const r=canvas.getBoundingClientRect(); const mx=e.clientX-r.left, my=e.clientY-r.top; let best=-1, bd=1e9; geebrs.forEach((g,i)=>{ const p=iso(g.x,g.y,1); const d=Math.hypot(mx-p.x,my-(p.y+12)); if(d<bd){bd=d;best=i;} }); if(bd<36){ selected=best; updateSelected(); } });
document.querySelectorAll('[data-cmd]').forEach(b => b.addEventListener('click', () => { runCommand(b.dataset.cmd); updateSelected(); }));
document.getElementById('spawn').onclick = () => { geebrs.push(newGeebr(['Nim','Greeb','Sog','Luma','Vetch'][rand(5)],5+rand(12),5+rand(12))); log('world','a new Geebr has made poor choices'); updateSelected(); };
document.getElementById('reset').onclick = reset;
document.getElementById('step').onclick = physicsStep;
document.getElementById('run').onclick = () => { runCommand(document.getElementById('console').value); updateSelected(); };
window.addEventListener('resize', resize);
window.addEventListener('error', e => showErr(e.error || e.message));
window.addEventListener('unhandledrejection', e => showErr(e.reason));
reset(); resize(); setInterval(physicsStep, 500); requestAnimationFrame(render);
window.runCommand = runCommand;
window.geebrWorld = { runCommand, step:physicsStep, reset, world:()=>world, geebrs:()=>geebrs };
})();
</script>
</body>
</html>
